name: Keep Supabase Alive

on:
  schedule:
    # 每天 UTC 00:00（台灣時間早上 8 點）執行一次
    - cron: "0 0 * * *"
  workflow_dispatch:   # 也可在 GitHub 頁面手動觸發測試

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query keep_alive table
        run: |
          curl --fail --silent --show-error \
            "https://fvsbucfxtpcdqedyjcik.supabase.co/rest/v1/keep_alive?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
